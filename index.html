<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soda Stereo - Ecos</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome (Iconos oficiales) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Tu CSS personalizado -->
    <link rel="stylesheet" href="CSS/style.css">
    
    <!-- Icono de la pestaña -->
    <link rel="icon" href="IMG/icono-soda.jpg">
</head>
<body class="bg-black text-white">

    <!-- SECCIÓN 1: Portada (Logo Animado) -->
    <div class="container-fluid d-flex justify-content-center align-items-center vh-100">
        <div class="titulo-portada text-center">
            <img src="IMG/titulo portada.png" class="img-fluid animate-up" alt="Soda Stereo Ecos">
        </div>
    </div>

    <!-- SECCIÓN 2: Video Expandido -->
    <!-- 'container-fluid' permite que el contenido use casi todo el ancho de la pantalla -->
    <div class="container-fluid pb-5">
        <div class="row justify-content-center">
            <!-- Aumentamos a 'col-lg-11' para que el video sea mucho más grande -->
            <div class="col-12 col-md-11 col-lg-11">
                
                <!-- Contenedor sin restricciones de ratio para máxima resolución -->
                <div class="contenedor-video-pro shadow-lg rounded overflow-hidden bg-black">
                    <video id="videoSoda" autoplay loop muted playsinline preload="auto">
                        <source src="VIDEO/soda_web.mp4" type="video/mp4">
                        Tu navegador no soporta videos embebidos.
                    </video>
                </div>
                
                <!-- BOTONES CIRCULARES (JavaScript los controla por ID) -->
                <div class="d-flex justify-content-center gap-4 mt-4">
                    <button id="btnPlayPausa" class="btn-circular" title="Reproducir/Pausar">
                        <i id="iconoPlay" class="fas fa-pause"></i>
                    </button>

                    <button id="btnMute" class="btn-circular" title="Activar/Quitar Sonido">
                        <i id="iconoMute" class="fas fa-volume-mute"></i>
                    </button>
                </div>
                
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT: Ubicado en tu carpeta 'js' -->
    <script src="js/script.js"></script>
    
</body>
</html>
